<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple gradient with text - no font dependency -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <!-- Use simple shapes instead of text that requires fonts -->
  <rect x="100" y="200" width="1000" height="100" rx="10" fill="white" opacity="0.9"/>
  <rect x="300" y="350" width="600" height="50" rx="10" fill="white" opacity="0.7"/>
  <rect x="400" y="500" width="400" height="30" rx="10" fill="white" opacity="0.5"/>
</svg>
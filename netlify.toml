# Netlify configuration
# Forces HTTPS and www canonical domain

[[redirects]]
  from = "http://toolreviewshub.com/*"
  to = "https://www.toolreviewshub.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.toolreviewshub.com/*"
  to = "https://www.toolreviewshub.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://toolreviewshub.com/*"
  to = "https://www.toolreviewshub.com/:splat"
  status = 301
  force = true

# Headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
name: Auto-Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Weekly content refresh - Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm init -y
          npm install js-yaml front-matter

      - name: Generate content
        run: node scripts/generate-content.js sites

      - name: Build sites
        run: node scripts/build-sites.js sites build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          keep_files: false
          commit_message: 'Auto-deploy: ${{ github.event.head_commit.message }}'
          
      - name: Generate deployment report
        run: |
          echo "## Deployment Report" > deployment-report.md
          echo "- Timestamp: $(date -Iseconds)" >> deployment-report.md
          echo "- Sites: $(ls -1 build/ | wc -l)" >> deployment-report.md
          echo "- Total pages: $(find build/ -name '*.html' | wc -l)" >> deployment-report.md
          cat deployment-report.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.md
